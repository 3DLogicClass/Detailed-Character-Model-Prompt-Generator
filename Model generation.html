// Features that should not be alphabetically sorted (keep logical order)
const specialSortFeatures = [
    "Age", "Height", "Hair Length", "Hair Volume", "Lip Size", "Eye Size", "Image Type"
];

/**
 * Sorts options alphabetically, except for special features that should keep their original order.
 * @param {string} featureName - Name of the feature
 * @param {Array} options - Array of option values
 * @returns {Array} Sorted or original options
 */
function sortOptions(featureName, options) {
    if (specialSortFeatures.includes(featureName)) return options;
    return [...options].sort((a, b) => a.localeCompare(b));
}

/**
 * Checks if a string is a valid hexadecimal color code.
 * @param {string} str - String to check
 * @returns {boolean}
 */
function isHexColor(str) {
    return /^#([0-9A-F]{3}){1,2}$/i.test(str);
}

/**
 * Returns a base hex color for common color names.
 * Used as fallback when user selects a named color.
 * @param {string} colorName - Color name (e.g. "Red", "Blue Dark")
 * @returns {string} Hex color code
 */
function getBaseHex(colorName) {
    const defaultColors = {
        'Black': '#000000', 'White': '#ffffff', 'Red': '#ff0000', 'Blue': '#0000ff',
        'Green': '#008000', 'Brown': '#a52a2a', 'Yellow': '#ffff00', 'Pink': '#ffc0cb',
        'Gray': '#808080', 'Default': '#ffffff'
    };
    const baseColor = colorName.split(' ')[0].replace(/[^a-zA-Z]/g, '');
    return defaultColors[baseColor] || defaultColors.Default;
}

/** Updates the character counter below the generated prompt */
function updateCharCounter() {
    const promptElement = document.getElementById('prompt');
    const counterElement = document.getElementById('char-counter');
    if (promptElement && counterElement) {
        counterElement.textContent = `Character Count: ${promptElement.textContent.length}`;
    }
}

/** 
 * Initializes default values, locks, and ignores for all features.
 * Called on load and when gender changes.
 */
function initState() {
    const group = features[currentGender];
    const allFeatures = {};
    for (let category in group) {
        Object.assign(allFeatures, group[category]);
    }

    for (let feature in allFeatures) {
        if (feature === "Environment & Custom") continue;

        const originalOptions = allFeatures[feature] || [];
        if (feature.includes("Color") && !originalOptions.includes(CUSTOM_COLOR_OPTION)) {
            originalOptions.unshift(CUSTOM_COLOR_OPTION);
        }

        const defaultOption = originalOptions[originalOptions.length > 0 && originalOptions[0] === CUSTOM_COLOR_OPTION ? 1 : 0];
        const currentValue = currentValues[feature];
        const isValueValid = originalOptions.includes(currentValue) || isHexColor(currentValue);

        if (!currentValue || !isValueValid) {
            let newValue = defaultOption;
            // Smart defaults for important features
            if (feature === "Age") newValue = "Young Adult (20-24)";
            else if (feature === "Height") newValue = "Tall";
            else if (feature === "Abs") newValue = "Slightly defined";
            else if (feature === "Leg Length") newValue = "Long legs";
            else if (feature === "Arm Length") newValue = "Long arms";
            else if (feature === "Waist") newValue = "Average waist";

            if (!originalOptions.includes(newValue) && !isHexColor(newValue)) newValue = defaultOption;
            currentValues[feature] = newValue;
        }

        if (!(feature in lockedFeatures)) lockedFeatures[feature] = false;
        if (!(feature in ignoredFeatures)) ignoredFeatures[feature] = false;
    }
}

/** Shows a temporary toast notification at the bottom right */
function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

/** 
 * Renders the sidebar category menu and triggers showCategory for the current category.
 */
function renderFeatures() {
    featuresContainer.innerHTML = "";
    categoryMenu.innerHTML = "";

    const categories = Object.keys(features[currentGender]);
    categories.sort((a, b) => a === "Base" ? -1 : (b === "Base" ? 1 : 0));

    const categoryIcons = {
        Base: 'fa-user', Face: 'fa-face-smile', Eyes: 'fa-eye', Lips: 'fa-lips',
        Hair: 'fa-ruler', Makeup: 'fa-paint-brush', Body: 'fa-person', Clothing: 'fa-shirt',
        Expression: 'fa-face-smile', Pose: 'fa-person-running',
        "Environment & Custom": 'fa-image', "Prompt Generation": 'fa-terminal', "Facial Hair": 'fa-beard'
    };

    categories.forEach(category => {
        const btn = document.createElement('button');
        btn.innerHTML = `<i class="fas ${categoryIcons[category] || 'fa-folder'}"></i> ${category}`;
        if (category === currentCategory) btn.classList.add('active');
        btn.addEventListener('click', () => {
            currentCategory = category;
            renderFeatures();
        });
        categoryMenu.appendChild(btn);
    });

    showCategory(currentCategory);
}

/** Updates visual state (locked/ignored styling) of a feature row */
function updateFeatureRowClasses(feature, row) {
    row.classList.remove('locked', 'ignored');
    if (lockedFeatures[feature]) row.classList.add('locked');
    if (ignoredFeatures[feature]) row.classList.add('ignored');
}

                if (field.id === 'customPlace') customPlace = randVal;
                if (field.id === 'customTime') customTime = randVal;
                if (field.id === 'customWeather') customWeather = randVal;
                if (field.id === 'customPositivePrompt') customPositivePrompt = randVal;

                    if (f.id === 'customPlace') customPlace = randVal;

            let isColorFeature = feature.includes("Color");

                colorPicker.addEventListener('input', e => {
                    currentValues[feature] = e.target.value;

                    currentValues[feature] = e.target.value;
                    if (e.target.value !== CUSTOM_COLOR_OPTION) {
                        colorPicker.value = getBaseHex(e.target.value);
                    }
                });
            } else {
                wrapper.appendChild(select);
                select.addEventListener('change', e => {
                    currentValues[feature] = e.target.value;
                    if (feature === "Gender") {
                        currentGender = e.target.value.toLowerCase();
                        initState();
                        renderFeatures();

            const controls = document.createElement('div');
            controls.className = 'feature-controls';

            const lockBox = document.createElement('input');
            lockBox.type = "checkbox";
            lockBox.id = feature + "_lock";
            lockBox.checked = lockedFeatures[feature] || false;
            lockBox.addEventListener('change', e => {
                lockedFeatures[feature] = e.target.checked;
                updateFeatureRowClasses(feature, wrapper);
            });

            const ignoreBox = document.createElement('input');
            ignoreBox.type = "checkbox";
            ignoreBox.id = feature + "_ignore";
            ignoreBox.checked = ignoredFeatures[feature] || false;
            ignoreBox.addEventListener('change', e => {
                ignoredFeatures[feature] = e.target.checked;
                updateFeatureRowClasses(feature, wrapper);
            });

            lockLabel.textContent = "Lock";
            lockLabel.htmlFor = lockBox.id;

            const ignoreLabel = document.createElement('label');
            ignoreLabel.textContent = "Ignore";
            ignoreLabel.htmlFor = ignoreBox.id;

            controls.appendChild(lockLabel);

        globalActions.appendChild(Object.assign(document.createElement('button'), {
            className: 'btn btn-control',
            innerHTML: '<i class="fas fa-eye"></i> Unignore All',
            onclick: () => updateGlobalState('ignore', false, 'Globally unignored all features.')
        }));
        globalActions.appendChild(Object.assign(document.createElement('button'), {
            className: 'btn btn-control',
            innerHTML: '<i class="fas fa-list-ul"></i> Load Preset',
            onclick: () => openPresetList()
        }));
        section.appendChild(globalActions);

        // =========================================
        // Prompt Generation Buttons
        // =========================================
        const otherActions = document.createElement('div');
        otherActions.className = 'prompt-actions';

        // Random Selection Button
        const randomBtn = document.createElement('button');
        randomBtn.className = 'btn btn-primary';
        randomBtn.innerHTML = '<i class="fas fa-dice"></i> Random Selection (All)';
        randomBtn.addEventListener('click', () => {
            let randomizedCount = 0;
            for (let cat in features[currentGender]) {
                if (cat === "Environment & Custom") continue;
                for (let feature in features[currentGender][cat]) {
                    if (!lockedFeatures[feature]) {
                        const options = features[currentGender][cat][feature];
                        const selectedValue = options[Math.floor(Math.random() * options.length)];
                        if (feature.includes("Color") && selectedValue === CUSTOM_COLOR_OPTION) {
                            currentValues[feature] = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
                        } else {
                            currentValues[feature] = selectedValue;
                        }
                        const select = document.getElementById(feature);
                        if (select) {
                            select.value = feature.includes("Color") && isHexColor(currentValues[feature]) ? CUSTOM_COLOR_OPTION : currentValues[feature];
                        }
                        randomizedCount++;
                    }
                }
            }
            showToast(`Randomized ${randomizedCount} values.`);
			renderFeatures();
        });
        otherActions.appendChild(randomBtn);

        // Generate Initial Prompt Button
        const generateInitialBtn = document.createElement('button');
        generateInitialBtn.className = 'btn btn-primary';
        generateInitialBtn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i> Generate Initial Prompt';
		generateInitialBtn.addEventListener('click', () => {
			let gender = currentValues["Gender"] || "Female";
			
			let isWhiteBg = (!ignoredCustomFeatures.customPlace && customPlace.trim() === "");
			
			
			let prompt = `Create an image of a ${gender === "Female" ? "woman" : "man"}`;
			
			if (isWhiteBg) {
				prompt += " standing on an absolute pure white background. ";
			} else {
				prompt += ". ";
			}

			const parts = [];
			for (let cat in features[currentGender]) {
				if (cat === "Environment & Custom") continue;
				for (let feature in features[currentGender][cat]) {
					if (feature === "Gender") continue;
					if (!ignoredFeatures[feature]) parts.push(`${feature}: ${currentValues[feature]}`);
				}
			}
			
			
			if (parts.length > 0) {
				prompt += parts.join(", ") + ". ";
			}
			
			prompt += "High-resolution, professional studio lighting, 8k, photorealistic.";

			
			if (!ignoredCustomFeatures.customPlace && customPlace.trim() !== "") prompt += "\n\nPlace: \"" + customPlace.trim() + "\"";
			if (!ignoredCustomFeatures.customTime && customTime.trim() !== "") prompt += "\n\nTime: \"" + customTime.trim() + "\"";
			if (!ignoredCustomFeatures.customWeather && customWeather.trim() !== "") prompt += "\n\nWeather: \"" + customWeather.trim() + "\"";

			if (!ignoredCustomFeatures.customPositivePrompt && customPositivePrompt.trim() !== "") prompt += "\n\nPositive Prompt: \"" + customPositivePrompt.trim() + "\"";
			if (!ignoredCustomFeatures.customNegativePrompt && customNegativePrompt.trim() !== "") prompt += "\n\nNegative Prompt: \"" + customNegativePrompt.trim() + "\"";

			document.getElementById('prompt').textContent = prompt;
			showToast('Initial Prompt Generated');
			updateCharCounter();
		});
        otherActions.appendChild(generateInitialBtn);

        // Generate Modification Prompt Button
        const generateModificationBtn = document.createElement('button');
        generateModificationBtn.className = 'btn btn-primary';
        generateModificationBtn.innerHTML = '<i class="fas fa-pen-to-square"></i> Generate Modification Prompt';
        generateModificationBtn.addEventListener('click', () => {
            const allFeaturesPrompt = [];
            let hasContent = false;
            let gender = currentValues["Gender"] || "Female";

            for (let cat in features[currentGender]) {
                if (cat === "Environment & Custom") continue;
                for (let feature in features[currentGender][cat]) {
                    if (feature === "Gender" || ignoredFeatures[feature]) continue;
                    hasContent = true;
                    allFeaturesPrompt.push(`${feature}: ${currentValues[feature]}`);
                }
            }

            let envActive = (!ignoredCustomFeatures.customPlace && customPlace) ||
                            (!ignoredCustomFeatures.customTime && customTime) ||
                            (!ignoredCustomFeatures.customWeather && customWeather);

            let prompt = "";
            if (!hasContent && !envActive) {
                prompt = (gender === "Female")
                    ? "No features included in the prompt for the woman. All are either locked or ignored."
                    : "No features included in the prompt for the man. All are either locked or ignored.";
            } else {
                prompt = (gender === "Female")
                    ? "Change the image of the woman, set to: "
                    : "Change the image of the man, set to: ";
                if (hasContent) prompt += allFeaturesPrompt.join(", ");
                if (!ignoredCustomFeatures.customPlace && customPlace.trim() !== "") prompt += (hasContent ? ", " : "") + "Place: " + customPlace.trim();
                if (!ignoredCustomFeatures.customTime && customTime.trim() !== "") prompt += (hasContent || customPlace.trim() !== "" ? ", " : "") + "Time: " + customTime.trim();
                if (!ignoredCustomFeatures.customWeather && customWeather.trim() !== "") prompt += (hasContent || customPlace.trim() !== "" || customTime.trim() !== "" ? ", " : "") + "Weather: " + customWeather.trim();
                prompt += ".";
            }

            if (hasContent || envActive) {
                if (!ignoredCustomFeatures.customPositivePrompt && customPositivePrompt.trim() !== "") prompt += " " + customPositivePrompt.trim();
                if (!ignoredCustomFeatures.customNegativePrompt && customNegativePrompt.trim() !== "") prompt += "\n\nNegative Prompt: " + customNegativePrompt.trim();
            }

            document.getElementById('prompt').textContent = prompt.trim();
            showToast('Modification Prompt Generated');
            updateCharCounter();
        });
        otherActions.appendChild(generateModificationBtn);

        // Copy Prompt Button
        otherActions.appendChild(Object.assign(document.createElement('button'), {
            className: 'btn btn-secondary',
            innerHTML: '<i class="fas fa-copy"></i> Copy Prompt',
            onclick: () => {
                const text = document.getElementById('prompt').textContent;
                if (text && text !== 'Generated Prompt will appear here...') {
                    navigator.clipboard.writeText(text).then(() => showToast('Prompt copied!'));
                } else {
                    showToast('No prompt to copy.');
                }
            }
        }));

        // Export JSON Button
        otherActions.appendChild(Object.assign(document.createElement('button'), {
            className: 'btn btn-secondary',
            innerHTML: '<i class="fas fa-file-download"></i> Export JSON',
            onclick: async () => {
                const data = {
                    currentGender,
                    currentValues,
                    lockedFeatures,
                    ignoredFeatures,
                    customPositivePrompt,
                    customNegativePrompt,
                    customPlace,
                    customTime,
                    customWeather,
                    ignoredCustomFeatures
                };
                const json = JSON.stringify(data, null, 2);
                const newFilename = `${(currentValues["Gender"] || currentGender).replace(/[^a-zA-Z0-9\s]/g, '').replace(/\s+/g, '_')}_${new Date().toISOString().split('T')[0]}.json`;

                try {
                    if ('showSaveFilePicker' in window) {
                        const fileHandle = await window.showSaveFilePicker({
                            suggestedName: newFilename,
                            types: [{ accept: { 'application/json': ['.json'] } }]
                        });
                        const writable = await fileHandle.createWritable();
                        await writable.write(json);
                        await writable.close();
                        showToast('Settings exported successfully.');
                    } else {
                        const url = URL.createObjectURL(new Blob([json], { type: "application/json" }));
                        const a = document.createElement("a");
                        a.href = url;
                        a.download = newFilename;
                        a.click();
                        URL.revokeObjectURL(url);
                    }
                } catch (err) {
                    showToast('Export cancelled or failed.');
                }
            }
        }));

        // Import JSON functionality
        const importJsonInput = document.createElement('input');
        importJsonInput.type = "file";
        importJsonInput.style.display = "none";
        importJsonInput.accept = ".json";
        importJsonInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.currentGender) currentGender = data.currentGender.toLowerCase();
                    if (data.currentValues) currentValues = data.currentValues;
                    if (data.lockedFeatures) lockedFeatures = data.lockedFeatures;
                    if (data.ignoredFeatures) ignoredFeatures = data.ignoredFeatures;
                    customPositivePrompt = data.customPositivePrompt || "";
                    customNegativePrompt = data.customNegativePrompt || "";
                    customPlace = data.customPlace || "";
                    customTime = data.customTime || "";
                    customWeather = data.customWeather || "";
                    if (data.ignoredCustomFeatures) ignoredCustomFeatures = data.ignoredCustomFeatures;

                    initState();
                    renderFeatures();
                    showToast('Settings imported successfully.');
                } catch {
                    alert("Invalid JSON file.");
                }
            };
            reader.readAsText(file);
        });
        otherActions.appendChild(importJsonInput);

        otherActions.appendChild(Object.assign(document.createElement('button'), {
            className: 'btn btn-secondary',
            innerHTML: '<i class="fas fa-file-upload"></i> Import JSON',
            onclick: () => importJsonInput.click()
        }));

        section.appendChild(otherActions);

        // Prompt display area
        const promptContainerDiv = document.createElement('div');
        promptContainerDiv.id = 'prompt-container';

        const promptDiv = document.createElement('div');
        promptDiv.id = 'prompt';
        promptDiv.textContent = 'Generated Prompt will appear here...';

        const charCounterDiv = document.createElement('div');
        charCounterDiv.id = 'char-counter';
        charCounterDiv.textContent = 'Character Count: 37';

        promptContainerDiv.appendChild(promptDiv);
        promptContainerDiv.appendChild(charCounterDiv);
        section.appendChild(promptContainerDiv);

        // Drag & Drop zone for JSON import
        const dropZone = document.createElement('div');
        dropZone.className = 'drop-zone';
        dropZone.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Drag and drop JSON file here or click to upload';
        dropZone.onclick = () => importJsonInput.click();
        dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files[0]?.type === 'application/json') {
                const list = new DataTransfer();
                list.items.add(e.dataTransfer.files[0]);
                importJsonInput.files = list.files;
                importJsonInput.dispatchEvent(new Event('change'));
            } else {
                showToast('Please drop a .json file.');
            }
        };
        section.appendChild(dropZone);
    }

    featuresContainer.appendChild(section);

    // Initialize Choices.js for searchable dropdowns (skip for Prompt Generation and Environment tabs)
    if (category !== "Prompt Generation" && category !== "Environment & Custom") {
        document.querySelectorAll('select').forEach(select => {
            new Choices(select, {
                searchEnabled: true,
                itemSelectText: '',
                noResultsText: 'No results found',
                noChoicesText: 'No choices available'
            });
        });
    }
}

/* =============================================
   SECTION 5: PRESET FUNCTIONS
   ============================================= */

function closePresetList() {
    document.getElementById('listviewModal').style.display = 'none';
}

function openPresetList() {
    const content = document.getElementById('presetsDynamicContent');
    if (typeof loadPresetsFromJS === 'function' && content && content.innerHTML === '') {
        loadPresetsFromJS();
    }
    document.getElementById('listviewModal').style.display = 'block';
}

function loadPresetsFromJS() {
    const container = document.getElementById('presetsDynamicContent');
    container.innerHTML = '';

    if (typeof presetData === 'undefined' || !presetData) {
        container.innerHTML = '<p>Error: presetData not loaded.</p>';
        return;
    }

    for (const cat in presetData) {
        const section = document.createElement('div');
        section.className = 'category-section';

        const h2 = document.createElement('h2');
        h2.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        section.appendChild(h2);

        const ul = document.createElement('ul');
        ul.className = 'preset-list';

        presetData[cat].forEach(preset => {
            const li = document.createElement('li');
            li.className = 'preset-item';

            const img = document.createElement('img');
            img.src = preset.preset_image;
            img.alt = preset.preset_name;
            li.appendChild(img);

            const name = document.createElement('p');
            name.textContent = preset.preset_name;
            li.appendChild(name);

            li.onclick = () => {
                if (preset.preset_json) {
                    applyPreset(JSON.parse(JSON.stringify(preset.preset_json)));
                } else {
                    showToast('Error: Data not found.');
                }
            };

            ul.appendChild(li);
        });

        section.appendChild(ul);
        container.appendChild(section);
    }
}

function applyPreset(data) {
    if (data.currentValues && data.currentGender) {
        currentGender = data.currentGender.toLowerCase();
        currentValues = { ...currentValues, ...(data.currentValues || {}) };
        lockedFeatures = { ...lockedFeatures, ...(data.lockedFeatures || {}) };
        ignoredFeatures = { ...ignoredFeatures, ...(data.ignoredFeatures || {}) };
        customPositivePrompt = data.customPositivePrompt || "";
        customNegativePrompt = data.customNegativePrompt || "";
        customPlace = data.customPlace || "";
        customTime = data.customTime || "";
        customWeather = data.customWeather || "";
        if (data.ignoredCustomFeatures) {
            ignoredCustomFeatures = { ...ignoredCustomFeatures, ...(data.ignoredCustomFeatures || {}) };
        }

        initState();
        renderFeatures();
        updateCharCounter();
        showToast(`Preset loaded for ${data.currentGender} successfully!`);
    } else {
        showToast("Invalid preset data structure.");
    }
}

// =============================================
// INITIALIZATION
// =============================================
initState();
renderFeatures();
</script>

<!-- Preset List Modal -->
<div id="listviewModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.7);">
    <div id="listviewContainer" style="background-color: #fefefe; margin: 5% auto; padding: 20px; border: 1px solid #888; width: 90%; height: 80%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #eee;">
            <h1>Preset List</h1>
            <span class="close-button" onclick="closePresetList()" style="color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer;">×</span>
        </div>
        <div id="presetsDynamicContent" style="flex-grow: 1; overflow-y: auto; margin-bottom: 10px;"></div>
    </div>
</div>

<style>
    .category-section { margin-bottom: 30px; background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .preset-list { list-style: none; padding: 0; display: flex; flex-wrap: wrap; gap: 20px; justify-content: flex-start; }
    .preset-item { cursor: pointer; border: 1px solid #ddd; padding: 10px; border-radius: 6px; text-align: center; width: 100px; transition: transform 0.2s; }
    .preset-item:hover { transform: scale(1.05); border-color: #5c67f2; }
    .preset-item img { width: 100%; height: auto; border-radius: 4px; margin-bottom: 5px; }
</style>

</body>
